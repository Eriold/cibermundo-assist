<!DOCTYPE html>

<script id="tailwind-config">

                extend: {

                        "primary-dark": "#d4d000",
                        "background-light": "#f8f8f5",
                        "background-dark": "#23220f",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2c2b15",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"],

                    borderRadius: {
                        "DEFAULT": "1rem",

        }

</span>
<span class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Sistema en línea</span>
